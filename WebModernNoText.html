<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #0a0805;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        .bg-rect {
            position: absolute;
            border: 1px solid rgba(139, 69, 19, 0.3); 
            background: rgba(139, 69, 19, 0.05);
            animation: float 40s infinite linear; 
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeIn 1.5s ease-in; /* Малку побрзо појавување */
        }

        .rect {
            position: relative;
            border: 1px solid rgba(200, 100, 50, 0.4);
            padding: 50px 80px;
            background: rgba(20, 15, 10, 0.85);
            backdrop-filter: blur(10px);
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
            min-width: 150px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .rect::after {
            content: "";
            position: absolute;
            top: 0; left: -150%;
            width: 60%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 165, 0, 0.3), transparent);
            transform: skewX(-25deg);
            /* Времетраењето е 3 секунди за побрз циклус */
            animation: shine 3s infinite ease-out; 
        }

        .label {
            letter-spacing: 8px;
            font-size: 12px;
            color: rgba(200, 100, 50, 0.6);
            text-transform: uppercase;
        }

        .separator {
            width: 40px;
            height: 1px;
            background: rgba(200, 100, 50, 0.4);
            margin-top: 15px;
        }

        /* Оптимизирана анимација за моментален блесок */
        @keyframes shine {
            0% { left: -150%; }
            /* Блесокот го поминува правоаголникот во првата секунда */
            35% { left: 150%; } 
            100% { left: 150%; }
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(30px, -20px) rotate(180deg) scale(1.1); }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-rect" style="width: 40vw; height: 40vw; top: -10%; left: -10%; animation-duration: 45s;"></div>
    <div class="bg-rect" style="width: 30vw; height: 50vw; bottom: -5%; right: -5%; animation-duration: 60s;"></div>
    <div class="bg-rect" style="width: 25vw; height: 25vw; top: 15%; right: 10%; animation-duration: 35s;"></div>
    <div class="bg-rect" style="width: 60vw; height: 30vw; bottom: 10%; left: -20%; animation-duration: 70s; opacity: 0.4;"></div>

    <div class="content">
        <div class="rect">
            <div class="label">IMAGERY</div>
            <div class="separator"></div>
        </div>
    </div>

</body>
</html>
