<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliflar Intro Gallery</title>
    <style>
        :root {
            --bg-dark: #0a1f24;
            --card-bg: #113238;
            --accent-orange: #f7a033;
            --accent-cyan: #00ffff;
            --text-cream: #f0e6d2;
            --border-color: #1a4d55;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-cream); 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }
        
        h2 { 
            color: var(--accent-orange); 
            letter-spacing: 3px; 
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .instruction {
            font-size: 14px;
            color: var(--accent-cyan);
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* ВИЗУЕЛЕН СИМБОЛ: ЛИНКОВИ -> ВИДЕО */
        .transform-container {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            padding: 15px 30px;
            background: rgba(17, 50, 56, 0.5);
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .links-icon { display: flex; flex-direction: column; gap: 4px; }
        .link-line { width: 25px; height: 4px; background: var(--accent-cyan); border-radius: 2px; }
        
        .arrow-anim {
            font-size: 24px;
            color: var(--accent-orange);
            animation: moveRight 1.5s infinite;
        }

        .video-icon {
            width: 45px;
            height: 30px;
            background: var(--text-cream);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .play-tri {
            width: 0; height: 0;
            border-left: 10px solid var(--accent-orange);
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
        }

        @keyframes moveRight {
            0% { transform: translateX(-5px); opacity: 0.3; }
            50% { opacity: 1; }
            100% { transform: translateX(5px); opacity: 0.3; }
        }

        /* ГАЛЕРИЈА */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 2px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .thumb {
            width: 100%;
            height: 100px;
            background: #051417;
            object-fit: cover;
            border-bottom: 2px solid var(--border-color);
        }

        .name { 
            padding: 12px; 
            font-size: 13px; 
            font-weight: bold; 
            color: var(--text-cream);
        }
        
        .copy-btn {
            background: var(--text-cream);
            color: var(--accent-orange);
            border: none;
            padding: 12px;
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .copy-btn:active {
            background: var(--accent-orange);
            color: white;
            transform: scale(0.95);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-orange);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            display: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h2>ELIFLAR INTROS</h2>
    <div class="instruction">Select with click to take intro to paste inside Eliflar app!</div>

    <div class="transform-container">
        <div class="links-icon">
            <div class="link-line"></div>
            <div class="link-line"></div>
            <div class="link-line"></div>
        </div>
        <div class="arrow-anim">➞</div>
        <div class="video-icon">
            <div class="play-tri"></div>
        </div>
    </div>
    
    <div class="gallery-grid">
        <div class="card">
            <img src="thumbnails/classic.jpg" class="thumb" alt="Classic">
            <div class="name">Classic Imagery</div>
            <button class="copy-btn" onclick="copyCode('intros/classic.html')">COPY CODE</button>
        </div>

        <div class="card">
            <img src="thumbnails/classic.jpg" class="thumb" alt="Modern">
            <div class="name">Modern Flare</div>
            <button class="copy-btn" onclick="copyCode('intros/classic.html')">COPY CODE</button>
        </div>

        <div class="card">
            <img src="thumbnails/classic.jpg" class="thumb" alt="Storm">
            <div class="name">Storm Tracker</div>
            <button class="copy-btn" onclick="copyCode('intros/classic.html')">COPY CODE</button>
        </div>
    </div>

    <div id="toast">CODE COPIED!</div>

    <script>
        async function copyCode(fileUrl) {
            try {
                const response = await fetch(fileUrl);
                const text = await response.text();
                
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            } catch (err) {
                console.error(err);
                alert('Грешка при влечење на кодот.');
            }
        }
    </script>
</body>
</html>
