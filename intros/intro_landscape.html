<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100%;height:100%;overflow:hidden;background:#010b10;font-family:'Segoe UI',Arial,sans-serif}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.stage{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:10;text-align:center;
  width:88%;
}
.label{
  font-size:11px;letter-spacing:6px;text-transform:uppercase;
  color:rgba(0,200,180,0.6);
  margin-bottom:14px;
}
.frame{
  border:1px solid rgba(0,190,175,0.35);
  padding:36px 44px;
  background:rgba(0,8,12,0.82);
}
.corner{position:absolute;width:12px;height:12px;border-color:rgba(0,190,175,0.7);border-style:solid}
.corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.inner{position:relative}
.divider{width:32px;height:1px;background:rgba(0,190,175,0.5);margin:0 auto 14px}
.theme{
  font-size:32px;font-weight:200;color:#fff;
  text-transform:uppercase;letter-spacing:4px;line-height:1.2;
  margin-bottom:14px;
}
.sep{width:24px;height:1px;background:rgba(0,190,175,0.35);margin:12px auto}
.user{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:rgba(0,220,200,0.7)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="stage">
  <div class="label">ELIFLAR</div>
  <div class="frame" style="position:relative">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="inner">
      <div class="divider"></div>
      <div class="theme">[[MOJA_TEMA]]</div>
      <div class="sep"></div>
      <div class="user">[[USER_SHOW]]</div>
    </div>
  </div>
</div>

<script>
var cv=document.getElementById('cv');
var x=cv.getContext('2d');
var t=0;

function rs(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
rs();
window.addEventListener('resize',rs);

var LAYERS=[
  {y:.32,amp:.06,freq:.45,spd:.006,col:'rgba(0,80,90,1)'},
  {y:.38,amp:.07,freq:.50,spd:.007,col:'rgba(0,100,95,1)'},
  {y:.44,amp:.07,freq:.55,spd:.008,col:'rgba(0,120,110,1)'},
  {y:.50,amp:.08,freq:.48,spd:.009,col:'rgba(0,140,125,1)'},
  {y:.56,amp:.08,freq:.52,spd:.010,col:'rgba(0,160,140,1)'},
  {y:.62,amp:.09,freq:.50,spd:.011,col:'rgba(0,180,160,1)'},
  {y:.70,amp:.09,freq:.45,spd:.012,col:'rgba(0,160,145,1)'},
  {y:.78,amp:.08,freq:.48,spd:.010,col:'rgba(0,130,120,1)'},
  {y:.86,amp:.07,freq:.50,spd:.009,col:'rgba(0,100,90,1)'},
];

function draw(){
  var W=cv.width,H=cv.height;
  x.clearRect(0,0,W,H);

  /* dark bg */
  var g=x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#000c10');
  g.addColorStop(1,'#001a18');
  x.fillStyle=g;
  x.fillRect(0,0,W,H);

  /* wave layers */
  for(var i=0;i<LAYERS.length;i++){
    var l=LAYERS[i];
    var baseY=l.y*H;
    var amp=l.amp*H;
    x.beginPath();
    x.moveTo(0,H);
    for(var px=0;px<=W;px+=3){
      var nx=px/W;
      var y=baseY
        +Math.sin(nx*Math.PI*2*l.freq+t*l.spd)*amp
        +Math.sin(nx*Math.PI*3*l.freq-t*l.spd*0.6)*amp*0.4
        +Math.sin(nx*Math.PI*1.4*l.freq+t*l.spd*0.4)*amp*0.2;
      x.lineTo(px,y);
    }
    x.lineTo(W,H);
    x.closePath();
    x.fillStyle=l.col;
    x.fill();
  }

  t+=1;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
