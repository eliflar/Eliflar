<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{
  width:100%;height:100%;background:#000;
  display:flex;justify-content:center;align-items:center;
  overflow:hidden;
  font-family:'Segoe UI',Arial,sans-serif;
}

/* background */
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.bg img{width:100%;height:100%;object-fit:cover;filter:brightness(0.25) blur(8px)}

/* stage */
.stage{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* portrait */
.portrait{
  flex-shrink:0;overflow:hidden;background:#222;
  border:3px solid #ff6600;
  box-shadow:0 0 20px rgba(255,102,0,.6);
  width:120px;height:120px;
  margin-bottom:-22px;
  border-radius:50%;
}
.portrait img{width:100%;height:100%;object-fit:cover;display:block}

/* frame */
.frame{
  border:3px solid #ff6600;
  background:rgba(0,0,0,.85);
  border-radius:4px;
  padding:40px 50px 30px 50px;
  text-align:center;
}
.lbl{letter-spacing:5px;font-size:11px;color:#ff6600;font-weight:900;margin-bottom:10px}
.theme{font-size:30px;font-weight:bold;color:#fff;text-transform:uppercase;letter-spacing:2px;margin:12px 0;line-height:1.2}
.user{font-size:15px;font-style:italic;color:#ffcc99}

/* triangle */
.tri{
  width:0;height:0;
  border-left:18px solid transparent;
  border-right:18px solid transparent;
  border-top:24px solid #ff6600;
  margin-top:20px;
}

/* selector */
#sel{
  position:fixed;top:12px;left:0;right:0;
  text-align:center;z-index:100;
}
.srow{display:inline-block;background:rgba(0,0,0,.75);border:1px solid rgba(255,102,0,.4);border-radius:30px;padding:7px 12px}
.sbtn{
  padding:5px 12px;font-size:10px;font-weight:800;
  text-transform:uppercase;border:1px solid rgba(255,102,0,.3);
  border-radius:16px;cursor:pointer;background:transparent;
  color:rgba(255,204,153,.7);margin:0 2px;
}
.sbtn.on{background:#ff6600;border-color:#ff6600;color:#fff}
</style>
</head>
<body>

<div class="bg">
  <img id="bg-img" src="[[MOJA_SLIKA]]" onerror="this.style.display='none'">
</div>

<div id="sel">
  <div class="srow">
    <button class="sbtn on" id="b-top"    onclick="setPos('top')">Top</button>
    <button class="sbtn"    id="b-left"   onclick="setPos('left')">Left</button>
    <button class="sbtn"    id="b-right"  onclick="setPos('right')">Right</button>
    <button class="sbtn"    id="b-bottom" onclick="setPos('bottom')">Bottom</button>
    &nbsp;
    <button class="sbtn on" id="b-circle" onclick="setShape('circle')">Circle</button>
    <button class="sbtn"    id="b-rect"   onclick="setShape('rect')">Square</button>
  </div>
</div>

<div class="stage" id="stage">
  <div class="portrait" id="portrait">
    <img id="portrait-img" src="[[MOJA_SLIKA]]" onerror="this.src='https://ui-avatars.com/api/?name=User&background=ff6600&color=fff&size=256&bold=true'">
  </div>
  <div class="frame">
    <div class="lbl">ELIFLAR</div>
    <div class="theme">[[MOJA_TEMA]]</div>
    <div class="user">[[USER_SHOW]]</div>
  </div>
  <div class="tri"></div>
</div>

<script>
var curPos='top', curShape='circle';
var sel=document.getElementById('sel');
var hideTimer;

function resetHide(){
  clearTimeout(hideTimer);
  sel.style.opacity='1';
  hideTimer=setTimeout(function(){sel.style.opacity='0';},3000);
}

sel.onclick=function(){resetHide();};
document.addEventListener('touchstart',function(){sel.style.opacity='1';resetHide();});
document.addEventListener('mousemove',function(e){if(e.clientY<80){sel.style.opacity='1';resetHide();}});
resetHide();

function setPos(pos){
  curPos=pos;
  var stage=document.getElementById('stage');
  var p=document.getElementById('portrait');

  /* reset */
  stage.style.flexDirection='column';
  p.style.width='120px';p.style.height='120px';
  p.style.marginBottom='0';p.style.marginTop='0';
  p.style.marginLeft='0';p.style.marginRight='0';

  if(pos==='top'){
    stage.style.flexDirection='column';
    p.style.marginBottom='-22px';
  } else if(pos==='left'){
    stage.style.flexDirection='row';
    p.style.marginRight='-18px';
  } else if(pos==='right'){
    stage.style.flexDirection='row-reverse';
    p.style.marginLeft='-18px';
  } else if(pos==='bottom'){
    stage.style.flexDirection='column-reverse';
    p.style.marginTop='-22px';
  }

  /* buttons */
  var ids=['top','left','right','bottom'];
  for(var i=0;i<ids.length;i++){
    var b=document.getElementById('b-'+ids[i]);
    if(b) b.className=b.className.replace(' on','');
    if(ids[i]===pos && b) b.className+=' on';
  }
  resetHide();
}

function setShape(shape){
  curShape=shape;
  var p=document.getElementById('portrait');
  p.style.borderRadius=shape==='circle'?'50%':'10px';

  var bc=document.getElementById('b-circle');
  var br=document.getElementById('b-rect');
  if(bc) bc.className=bc.className.replace(' on','');
  if(br) br.className=br.className.replace(' on','');
  if(shape==='circle'&&bc) bc.className+=' on';
  if(shape==='rect'&&br)   br.className+=' on';
  resetHide();
}
</script>
</body>
</html>
