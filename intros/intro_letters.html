<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;width:100%;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif}
canvas{position:absolute;top:0;left:0}

.stage{position:relative;z-index:10;text-align:center;width:90%;max-width:600px}

.label{
  letter-spacing:.55em;font-size:11px;color:rgba(255,255,255,0.4);
  text-transform:uppercase;margin-bottom:18px;
  animation:fadeIn .6s ease both;
}

#theme-wrap{
  font-size:clamp(28px,7vw,56px);font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;
  line-height:1.1;min-height:1.2em;
  display:flex;flex-wrap:wrap;justify-content:center;gap:0 2px;
}

.letter{
  display:inline-block;
  opacity:0;
  transform:translateY(60px) scale(0.3) rotate(var(--r));
  animation:letterIn .5s cubic-bezier(.175,.885,.32,1.5) forwards;
}

#user-line{
  margin-top:22px;font-size:clamp(11px,2vw,15px);
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,255,255,0);
  animation:userReveal .8s ease forwards;
}

.sep{width:0;height:2px;background:linear-gradient(90deg,transparent,#fff,transparent);margin:16px auto;animation:lineGrow .6s ease forwards}

/* particle burst elements */
.burst{
  position:absolute;pointer-events:none;
  width:6px;height:6px;border-radius:50%;
  animation:burst var(--dur) ease-out forwards;
}

@keyframes letterIn{
  0%  {opacity:0;transform:translateY(60px) scale(0.3) rotate(var(--r))}
  60% {opacity:1;transform:translateY(-8px) scale(1.15) rotate(0deg)}
  100%{opacity:1;transform:translateY(0)   scale(1)    rotate(0deg)}
}
@keyframes userReveal{
  0%  {color:rgba(255,255,255,0);letter-spacing:.6em}
  100%{color:rgba(255,255,255,0.7);letter-spacing:.3em}
}
@keyframes lineGrow{
  0%  {width:0;opacity:0}
  100%{width:120px;opacity:1}
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(-10px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes burst{
  0%  {transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="stage">
  <div class="label">IMAGERY</div>
  <div id="theme-wrap"></div>
  <div class="sep"></div>
  <div id="user-line">[[USER_SHOW]]</div>
</div>

<script>
/* ── background aurora ── */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function rs(){cv.width=window.innerWidth;cv.height=window.innerHeight}rs();
window.addEventListener('resize',rs);
const cols=['#ff006e','#8338ec','#3a86ff','#06d6a0','#ffbe0b','#fb5607'];
let t=0;
function drawBg(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);
  for(let i=0;i<4;i++){
    const x=cv.width*(.2+.6*Math.sin(t*.3+i*1.3));
    const y=cv.height*(.3+.4*Math.cos(t*.2+i*1.1));
    const r=cv.width*.35+50*Math.sin(t*.5+i);
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,cols[i%cols.length].replace(')',',0.07)').replace('#','rgba('+parseInt(cols[i%cols.length].slice(1,3),16)+','+parseInt(cols[i%cols.length].slice(3,5),16)+','+parseInt(cols[i%cols.length].slice(5,7),16)+','));
    // simpler approach
    ctx.globalAlpha=0.06+0.03*Math.sin(t+i);
    ctx.fillStyle=cols[i%cols.length];
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  t+=0.015;
  requestAnimationFrame(drawBg);
}
drawBg();

/* ── letter-by-letter intro ── */
const theme = '[[MOJA_TEMA]]';
const wrap  = document.getElementById('theme-wrap');
const hues  = [0,30,60,120,180,240,300,330];

theme.split('').forEach((ch, i) => {
  const span = document.createElement('span');
  span.className = 'letter';
  span.textContent = ch === ' ' ? '\u00A0' : ch;

  const delay   = 0.4 + i * 0.07;
  const hue     = hues[i % hues.length];
  const rot     = (Math.random() * 60 - 30) + 'deg';

  span.style.cssText = `
    --r:${rot};
    animation-delay:${delay}s;
    color:hsl(${hue},100%,70%);
    text-shadow:0 0 20px hsl(${hue},100%,50%),0 0 40px hsl(${hue},100%,30%);
    animation-name:letterIn;
  `;

  /* burst particles on letter appear */
  span.addEventListener('animationend', () => {
    for(let p=0;p<8;p++){
      const b=document.createElement('div');
      b.className='burst';
      const angle=Math.random()*Math.PI*2;
      const dist=40+Math.random()*60;
      b.style.cssText=`
        --tx:${Math.cos(angle)*dist}px;
        --ty:${Math.sin(angle)*dist}px;
        --dur:${0.4+Math.random()*0.4}s;
        background:hsl(${hue},100%,65%);
        left:${span.offsetLeft+span.offsetWidth/2}px;
        top:${span.offsetTop+span.offsetHeight/2}px;
        position:fixed;z-index:5;pointer-events:none;
      `;
      document.body.appendChild(b);
      b.addEventListener('animationend',()=>b.remove());
    }
  },{once:true});

  wrap.appendChild(span);
});

/* animate user line delay after last letter */
const uDelay = 0.4 + theme.length * 0.07 + 0.3;
document.getElementById('user-line').style.animationDelay = uDelay + 's';
document.querySelector('.sep').style.animationDelay = (uDelay - 0.2) + 's';
</script>
</body>
</html>
