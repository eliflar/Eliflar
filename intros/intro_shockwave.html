<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05000f;width:100%;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif}
canvas{position:absolute;top:0;left:0}

.stage{position:relative;z-index:10;text-align:center;width:90%;max-width:600px}

.label{
  font-size:11px;letter-spacing:.6em;text-transform:uppercase;
  color:rgba(180,100,255,0.55);margin-bottom:16px;
  opacity:0;animation:popIn .4s ease forwards 2s;
}

.frame{
  position:relative;
  border:1px solid rgba(180,100,255,0.3);
  padding:clamp(30px,5vw,55px) clamp(24px,7vw,70px);
  background:rgba(5,0,15,0.85);
  overflow:hidden;
  clip-path:inset(50% 50% 50% 50%);
  animation:openFrame .6s cubic-bezier(.77,0,.18,1) forwards 1.2s;
}
.frame::after{
  content:'';position:absolute;top:0;left:-160%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(180,100,255,0.15),transparent);
  transform:skewX(-20deg);
  animation:shine 3s 2s infinite ease-out;
}
.c{position:absolute;width:12px;height:12px;border-color:rgba(180,100,255,0.8);border-style:solid}
.c.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.c.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.c.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.c.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

.theme{
  font-size:clamp(24px,6vw,50px);font-weight:200;
  text-transform:uppercase;letter-spacing:.18em;
  color:#fff;position:relative;
  opacity:0;
  animation:smashIn .5s cubic-bezier(.175,.885,.32,1.6) forwards 1.6s;
}

.sep{
  width:0;height:1px;margin:16px auto;
  background:linear-gradient(90deg,transparent,rgba(180,100,255,0.8),transparent);
  animation:growLine .5s ease forwards 2s;
}

.user{
  font-size:clamp(11px,1.8vw,14px);
  letter-spacing:.28em;text-transform:uppercase;
  color:rgba(180,100,255,0);
  animation:userIn .6s ease forwards 2.2s;
}

@keyframes openFrame{
  to{clip-path:inset(0% 0% 0% 0%)}
}
@keyframes smashIn{
  0%  {opacity:0;transform:scale(2.5);filter:blur(12px)}
  50% {opacity:1;filter:blur(0)}
  80% {transform:scale(0.95)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes popIn{
  from{opacity:0;transform:translateY(-6px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes growLine{to{width:80px}}
@keyframes userIn{to{color:rgba(180,100,255,0.7)}}
@keyframes shine{
  0%{left:-160%}45%{left:160%}100%{left:160%}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="stage">
  <div class="label">IMAGERY</div>
  <div class="frame">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="theme">[[MOJA_TEMA]]</div>
    <div class="sep"></div>
    <div class="user">[[USER_SHOW]]</div>
  </div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function rs(){cv.width=window.innerWidth;cv.height=window.innerHeight}rs();
window.addEventListener('resize',rs);

/* particles */
const P=[];
function spawnBurst(x,y,n,hue){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=2+Math.random()*8;
    P.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      r:Math.random()*3+1,op:1,
      hue:hue+(Math.random()*60-30),
      drag:.95});
  }
}

/* shockwaves */
const W=[];
function spawnWave(x,y,color){
  W.push({x,y,r:0,maxR:Math.max(cv.width,cv.height)*.8,op:.8,color});
}

let started=false;
setTimeout(()=>{
  if(!started){
    started=true;
    const cx=cv.width/2,cy=cv.height/2;
    spawnWave(cx,cy,'180,100,255');
    spawnBurst(cx,cy,80,270);
    setTimeout(()=>{spawnWave(cx,cy,'220,150,255');spawnBurst(cx,cy,50,290)},300);
    setTimeout(()=>{spawnWave(cx,cy,'140,60,255');spawnBurst(cx,cy,40,250)},600);
  }
},800);

/* background nebula particles */
const stars=Array.from({length:120},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*.8+.2,
  op:Math.random()*.4+.1,
  sp:Math.random()*.003+.001
}));

let t=0;
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#05000f';ctx.fillRect(0,0,cv.width,cv.height);

  /* stars */
  stars.forEach(s=>{
    s.op=.1+.3*Math.abs(Math.sin(t*s.sp*100));
    ctx.beginPath();ctx.arc(s.x*cv.width,s.y*cv.height,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,150,255,${s.op})`;ctx.fill();
  });

  /* shockwaves */
  W.forEach((w,i)=>{
    ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${w.color},${w.op})`;
    ctx.lineWidth=3-w.r/w.maxR*2;ctx.stroke();
    w.r+=cv.width*.025;w.op-=.018;
    if(w.op<=0||w.r>w.maxR)W.splice(i,1);
  });

  /* particles */
  P.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},100%,70%,${p.op})`;ctx.fill();
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=p.drag;p.vy*=p.drag;
    p.vy+=.08;
    p.op-=.018;p.r*=.98;
    if(p.op<=0)P.splice(i,1);
  });

  t+=.01;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
