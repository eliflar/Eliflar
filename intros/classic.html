<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Georgia', serif;
        }

        .bg-container, .bg-container img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        .bg-container img {
            object-fit: fill; 
            filter: brightness(0.4) blur(4px);
            z-index: -1;
        }

        .content {
            position: relative; 
            z-index: 10; 
            text-align: center; 
            color: white;
            animation: zoom 3s ease-in-out infinite;
        }

        .rect {
            /* ПРОМЕНА: Портокалова неонска боја наместо сина */
            border: 4px double #ff6600;
            padding: 40px 60px;
            background: rgba(0, 0, 0, 0.7);
            /* ПРОМЕНА: Пулсирачка портокалова сенка */
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.6);
            backdrop-filter: blur(5px);
            animation: glow 2s infinite alternate;
        }

        .theme { font-size: 36px; font-weight: bold; margin: 15px 0; color: white; }
        .user { font-size: 20px; font-style: italic; color: #ffcc99; }

        .tri {
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            /* ПРОМЕНА: Портокалов триаголник */
            border-top: 28px solid #ff6600;
            margin: 25px auto;
            animation: bounce 1.5s infinite ease-in-out;
        }

        /* НОВ ЕФЕКТ: Пулсирање на сјајот за видлив Web ефект */
        @keyframes glow {
            from { box-shadow: 0 0 20px rgba(255, 102, 0, 0.4); }
            to { box-shadow: 0 0 45px rgba(255, 102, 0, 0.9); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(15px); }
        }

        @keyframes zoom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <img src="[[MOJA_SLIKA]]">
    </div>

    <div class="content">
        <div class="rect">
            <div style="letter-spacing: 5px; font-size: 14px; color: #ff6600; font-weight: bold;">WEB INTRО ACTIVE</div>
            <div class="theme">[[MOJA_TEMA]]</div>
            <div class="user">[[USER_SHOW]]</div>
        </div>
        <div class="tri"></div>
    </div>

</body>
</html>
