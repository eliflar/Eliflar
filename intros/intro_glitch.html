<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;width:100%;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif}

/* scanlines overlay */
body::after{
  content:'';position:fixed;inset:0;z-index:50;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);
}

.stage{position:relative;z-index:10;text-align:center;width:90%;max-width:620px}

.label{
  font-size:11px;letter-spacing:.6em;text-transform:uppercase;
  color:rgba(0,255,200,0.5);margin-bottom:20px;
  animation:fadeLabel 1s ease both .3s;
}

/* glitch frame */
.frame{
  position:relative;
  border:1px solid rgba(0,255,200,0.25);
  padding:clamp(30px,5vw,55px) clamp(24px,7vw,70px);
  background:rgba(0,0,0,0.7);
}
.frame::before,.frame::after{
  content:'';position:absolute;inset:0;
  border:1px solid;pointer-events:none;
}
.frame::before{border-color:rgba(255,0,80,0.3);animation:glitchBox1 4s infinite}
.frame::after {border-color:rgba(0,200,255,0.3);animation:glitchBox2 4s infinite}

/* corner marks */
.c{position:absolute;width:14px;height:14px;border-color:#00ffc8;border-style:solid}
.c.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.c.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.c.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.c.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

/* main theme text with chromatic aberration */
.theme{
  font-size:clamp(24px,6vw,50px);font-weight:700;
  text-transform:uppercase;letter-spacing:.15em;
  color:#fff;position:relative;
  animation:revealTheme 1s cubic-bezier(.77,0,.18,1) both .6s;
}
.theme::before{
  content:attr(data-text);position:absolute;left:0;right:0;
  color:#ff0050;top:0;
  animation:chromaR 3s infinite 1.5s;
  clip-path:inset(0 0 50% 0);
}
.theme::after{
  content:attr(data-text);position:absolute;left:0;right:0;
  color:#00c8ff;top:0;
  animation:chromaB 3s infinite 1.5s;
  clip-path:inset(50% 0 0 0);
}

.sep{
  width:0;height:1px;margin:18px auto;
  background:linear-gradient(90deg,transparent,#00ffc8,transparent);
  animation:growLine .5s ease forwards 1.4s;
}

.user{
  font-size:clamp(11px,1.8vw,14px);
  letter-spacing:.28em;text-transform:uppercase;
  color:rgba(0,255,200,0);
  animation:showUser .6s ease forwards 1.7s;
}

/* glitch slice animation on theme */
.glitch-slice{
  position:absolute;left:0;right:0;overflow:hidden;
  animation:sliceAnim 5s infinite 2s;
  color:#fff;font-size:clamp(24px,6vw,50px);font-weight:700;
  text-transform:uppercase;letter-spacing:.15em;
}

@keyframes revealTheme{
  0%  {opacity:0;transform:scaleX(1.3);filter:blur(8px)}
  60% {opacity:1;filter:blur(0)}
  100%{opacity:1;transform:scaleX(1)}
}
@keyframes fadeLabel{
  from{opacity:0;transform:translateY(-8px)}
  to  {opacity:1;transform:translateY(0)}
}
@keyframes growLine{
  to{width:100px}
}
@keyframes showUser{
  to{color:rgba(0,255,200,0.65)}
}
@keyframes chromaR{
  0%,90%,100%{transform:translateX(0);opacity:0.4}
  92%{transform:translateX(-4px);opacity:0.8}
  94%{transform:translateX(3px);opacity:0.6}
  96%{transform:translateX(-2px);opacity:0.8}
  98%{transform:translateX(0);opacity:0.4}
}
@keyframes chromaB{
  0%,90%,100%{transform:translateX(0);opacity:0.4}
  92%{transform:translateX(4px);opacity:0.8}
  94%{transform:translateX(-3px);opacity:0.6}
  96%{transform:translateX(2px);opacity:0.8}
  98%{transform:translateX(0);opacity:0.4}
}
@keyframes glitchBox1{
  0%,88%,100%{transform:translate(0)}
  90%{transform:translate(-3px,1px)}
  92%{transform:translate(2px,-1px)}
  94%{transform:translate(0)}
}
@keyframes glitchBox2{
  0%,88%,100%{transform:translate(0)}
  91%{transform:translate(3px,-1px)}
  93%{transform:translate(-2px,1px)}
  95%{transform:translate(0)}
}
@keyframes sliceAnim{
  0%,85%,100%{clip-path:inset(50% 0 50% 0);transform:translateX(0)}
  87%{clip-path:inset(20% 0 60% 0);transform:translateX(-8px)}
  89%{clip-path:inset(60% 0 20% 0);transform:translateX(6px)}
  91%{clip-path:inset(40% 0 40% 0);transform:translateX(-4px)}
  93%{clip-path:inset(50% 0 50% 0);transform:translateX(0)}
}

/* background grid */
canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="stage">
  <div class="label">IMAGERY</div>
  <div class="frame">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="theme" id="theme" data-text="[[MOJA_TEMA]]">[[MOJA_TEMA]]</div>
    <div class="sep"></div>
    <div class="user">[[USER_SHOW]]</div>
  </div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function rs(){cv.width=window.innerWidth;cv.height=window.innerHeight}rs();
window.addEventListener('resize',rs);

const SZ=40;
const pulses=[];
setInterval(()=>{
  if(pulses.length<6)
    pulses.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:0,op:.5});
},700);

let t=0;
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,cv.width,cv.height);

  /* grid */
  ctx.strokeStyle='rgba(0,255,200,0.06)';ctx.lineWidth=.5;
  for(let i=0;i<cv.width/SZ+1;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,cv.height);ctx.stroke()}
  for(let j=0;j<cv.height/SZ+1;j++){ctx.beginPath();ctx.moveTo(0,j*SZ);ctx.lineTo(cv.width,j*SZ);ctx.stroke()}

  /* pulse ripples */
  pulses.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,255,200,${p.op})`;ctx.lineWidth=.8;ctx.stroke();
    p.r+=2;p.op-=.012;
    if(p.op<=0)pulses.splice(i,1);
  });

  /* random glitch scanlines */
  if(Math.random()<0.04){
    const y=Math.random()*cv.height;
    ctx.fillStyle=`rgba(0,255,200,${Math.random()*.05})`;
    ctx.fillRect(0,y,cv.width,Math.random()*4+1);
  }

  t+=0.01;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
