<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000508;width:100%;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace}
canvas{position:absolute;top:0;left:0}

.stage{position:relative;z-index:10;text-align:center;width:90%;max-width:620px}

.label{
  font-size:10px;letter-spacing:.7em;text-transform:uppercase;
  color:rgba(0,220,255,0.45);margin-bottom:20px;
  animation:blinkIn .3s steps(1) both .5s;
}

.frame{
  position:relative;
  border:1px solid rgba(0,220,255,0.2);
  padding:clamp(30px,5vw,55px) clamp(24px,7vw,70px);
  background:rgba(0,5,8,0.9);
}
.c{position:absolute;width:12px;height:12px;border-color:rgba(0,220,255,.7);border-style:solid}
.c.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.c.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.c.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.c.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

/* typewriter theme */
.theme{
  font-size:clamp(22px,5.5vw,46px);font-weight:700;
  text-transform:uppercase;letter-spacing:.12em;
  color:#00dcff;
  text-shadow:0 0 10px #00dcff,0 0 30px rgba(0,220,255,0.5);
  white-space:nowrap;overflow:hidden;
  width:0;border-right:3px solid #00dcff;
  animation:
    typeIt var(--type-dur) steps(var(--type-steps)) forwards var(--type-start),
    cursorBlink .6s step-end infinite,
    neonFlicker 8s infinite var(--flicker-start);
  display:inline-block;
}

.sep{
  width:0;height:1px;margin:18px auto;
  background:linear-gradient(90deg,transparent,#00dcff,transparent);
  animation:growLine .4s ease forwards var(--sep-start);
}

.user{
  font-size:clamp(11px,1.8vw,14px);
  letter-spacing:.3em;text-transform:uppercase;
  color:rgba(0,220,255,0);font-family:'Segoe UI',sans-serif;
  animation:showUser .5s ease forwards var(--user-start);
}

@keyframes typeIt{
  from{width:0}
  to  {width:100%}
}
@keyframes cursorBlink{
  50%{border-color:transparent}
}
@keyframes neonFlicker{
  0%,96%,100%{opacity:1;text-shadow:0 0 10px #00dcff,0 0 30px rgba(0,220,255,0.5)}
  97%{opacity:.4;text-shadow:none}
  98%{opacity:1;text-shadow:0 0 10px #00dcff,0 0 60px rgba(0,220,255,0.8)}
  99%{opacity:.7;text-shadow:0 0 5px #00dcff}
}
@keyframes growLine{to{width:80px}}
@keyframes showUser{to{color:rgba(0,220,255,0.6)}}
@keyframes blinkIn{
  0%,100%{opacity:1}50%{opacity:0}
}
@keyframes flashScreen{
  0%{opacity:0}5%{opacity:.15}15%{opacity:0}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="stage">
  <div class="label">IMAGERY</div>
  <div class="frame">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="theme" id="theme">[[MOJA_TEMA]]</div>
    <div class="sep" id="sep"></div>
    <div class="user" id="user">[[USER_SHOW]]</div>
  </div>
</div>

<div id="flash" style="position:fixed;inset:0;background:#00dcff;opacity:0;pointer-events:none;z-index:100;"></div>

<script>
/* ── timing setup based on text length ── */
const theme  = document.getElementById('theme');
const sep    = document.getElementById('sep');
const user   = document.getElementById('user');
const flash  = document.getElementById('flash');
const chars  = theme.textContent.trim().length;
const speed  = 0.07; // seconds per character
const start  = 1.0;
const dur    = chars * speed;
const sepT   = start + dur + 0.2;
const userT  = sepT + 0.4;
const flickT = start + dur + 0.8;

theme.style.setProperty('--type-dur',   dur   + 's');
theme.style.setProperty('--type-steps', chars);
theme.style.setProperty('--type-start', start + 's');
theme.style.setProperty('--flicker-start', flickT + 's');
sep.style.setProperty('--sep-start',   sepT  + 's');
user.style.setProperty('--user-start', userT + 's');

/* ── canvas: lightning + scan ── */
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function rs(){cv.width=window.innerWidth;cv.height=window.innerHeight}rs();
window.addEventListener('resize',rs);

function lightning(x1,y1,x2,y2,rough,dep){
  if(dep<=0){ctx.lineTo(x2,y2);return}
  const mx=(x1+x2)/2+(Math.random()-.5)*rough;
  const my=(y1+y2)/2+(Math.random()-.5)*rough;
  lightning(x1,y1,mx,my,rough/2,dep-1);
  lightning(mx,my,x2,y2,rough/2,dep-1);
}

function drawLightning(){
  const x=cv.width/2+(Math.random()-.5)*cv.width*.6;
  ctx.save();
  ctx.strokeStyle=`rgba(0,220,255,${.4+Math.random()*.4})`;
  ctx.lineWidth=Math.random()*1.5+.5;
  ctx.shadowColor='#00dcff';ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(x,0);
  lightning(x,0,x+(Math.random()-.5)*200,cv.height*.7,180,6);
  ctx.stroke();
  ctx.restore();
  /* white flash */
  flash.style.animation='none';
  flash.offsetHeight;
  flash.style.animation='flashScreen .3s ease forwards';
}

/* trigger lightning strikes */
const strikes=[1.8,3.5,5.2,7.1,9.8,13];
strikes.forEach(t=>setTimeout(drawLightning,t*1000));
setInterval(()=>{ if(Math.random()<.3) drawLightning(); }, 4000);

/* background */
const rain=Array.from({length:60},()=>({
  x:Math.random(),y:Math.random(),
  s:Math.random()*4+2,l:Math.random()*12+5,
  o:Math.random()*.2+.05
}));

let t=0;
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#000508';ctx.fillRect(0,0,cv.width,cv.height);

  /* rain */
  rain.forEach(r=>{
    ctx.strokeStyle=`rgba(0,180,220,${r.o})`;ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(r.x*cv.width,r.y*cv.height);
    ctx.lineTo(r.x*cv.width-1,r.y*cv.height+r.l);ctx.stroke();
    r.y+=r.s/cv.height;
    if(r.y>1){r.y=0;r.x=Math.random()}
  });

  t+=.01;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
